# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - b2b-marketplace-frontend

on:
  push:
    branches:
      - main
    paths:
      - 'b2b-medusa-storefront/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          
      - name: Create .env.production from secret
        working-directory: b2b-medusa-storefront
        env:
          FRONTEND_PROD_VARS: ${{ secrets.FRONTEND_PROD_VARS }}
        run: |
          echo "$FRONTEND_PROD_VARS" > .env.production

      - name: npm install and build (b2b-medusa-storefront)
        working-directory: b2b-medusa-storefront
        run: |
          npm ci
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: b2b-medusa-storefront
          include-hidden-files: true


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'b2b-marketplace-frontend'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_4F97B41999834164A85569001F6F7DD0 }}