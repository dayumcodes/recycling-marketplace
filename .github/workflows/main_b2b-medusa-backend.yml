# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - b2b-medusa-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install and build (b2b-medusa)
        working-directory: b2b-medusa
        run: |
            npm ci
            npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: b2b-medusa

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Debug - package contents and size
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Top-level contents ==="
          ls -la
          echo "=== Package size ==="
          du -sh .
          echo "=== Key paths (optional) ==="
          ls -la node_modules 2>/dev/null || true
          ls -la .medusa 2>/dev/null || true
          ls -la medusa-config.js 2>/dev/null || true

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'b2b-medusa-backend'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FBCFA339567543F4AB1F004E3FEB6513 }}

      - name: Show deploy outcome
        if: always()
        run: |
          echo "Deploy step result: ${{ steps.deploy-to-webapp.outcome }}"
          echo "Deploy step conclusion: ${{ steps.deploy-to-webapp.conclusion }}"